name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SHFS.csproj

      - name: Build
        run: dotnet build SHFS.csproj -c Release --no-restore

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net48/SHFS.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
